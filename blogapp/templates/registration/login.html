{% extends 'blogapp/base.html' %}
{% block title %}Login – MyBlog{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card">
      <div class="text-center mb-4">
        <i class="bi bi-person-circle" style="font-size:2.8rem;color:var(--accent);"></i>
        <h2 class="mt-2">Welcome Back</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
          </div>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger py-2 small">Invalid username or password.</div>
        {% endif %}
        <button type="submit" class="btn btn-submit">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
      </form>
      <hr class="my-4"/>
      <p class="text-center mb-0">Don't have an account?
        <a href="{% url 'signup' %}" style="color:var(--accent);font-weight:600;">Sign Up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
