{% extends 'blogapp/base.html' %}
{% block title %}Create Post – MyBlog{% endblock %}

{% block content %}
<div class="row justify-content-center mt-2">
  <div class="col-md-8 col-lg-7">
    <div class="auth-card">
      <div class="mb-4">
        <h2><i class="bi bi-journal-plus me-2" style="color:var(--accent);"></i>Write a New Post</h2>
        <p class="text-muted">Share your story with the world</p>
      </div>
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Post Title</label>
          <input type="text" name="title" class="form-control form-control-lg" placeholder="An interesting title..." required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Content</label>
          <textarea name="content" class="form-control" rows="8" placeholder="Write your blog post here..." required></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Cover Image <span class="text-muted fw-normal">(optional)</span></label>
          <input type="file" name="image" class="form-control" accept="image/*"/>
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-submit" style="width:auto;padding:10px 32px;">
            <i class="bi bi-send me-1"></i>Publish Post
          </button>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
